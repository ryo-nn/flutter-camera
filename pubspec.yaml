name: flutter_camera
description: "flutter-camera: パターン加工×SNS一括投稿アプリ"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# バージョンは docs/design.md 「pubspec.yaml 依存パッケージ」章 + 第9章(追補による変更点)を
# 起点に、`flutter pub get` で実解決可能な組み合わせへ調整している(下記NOTE参照)。
dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  # NOTE: design.md は flutter_riverpod ^3.3.2 / riverpod_annotation ^4.0.3 を指定するが、
  # Flutter 3.41.2 SDK同梱の flutter_test が meta を 1.17.0 に固定するため、
  # riverpod_generator(analyzer ^12.0.0 要求)と組み合わせると version solving に失敗する
  # (flutter pub get で再確認済み)。本SDK上で dev:riverpod_generator と共存可能な最大バージョン
  # である riverpod_annotation ^4.0.2(riverpod 3.2.1 系列)へ調整する。
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  # ルーティング
  go_router: ^17.3.0
  # モデル
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  # ネットワーク
  dio: ^5.10.0
  # カメラ・画像
  camera: ^0.12.0+1
  # NOTE: design.md は ^13.0.0(2026-07-04時点pub.dev最新)を指定するが、13.0.0 および
  # 12.4.8以降(CHANGELOG: 「Update CI to Flutter 3.44」)は SizeTransition の
  # `alignment` 引数(現行Flutterでは `axisAlignment`)・ReorderableListView.builder の
  # `onReorderItem` 引数(現行Flutterでは `onReorder`)など、本プロジェクトの
  # Flutter 3.41.2 SDKに存在しないAPIを使用しておりコンパイル不能(実機確認済み)。
  # 12.4.8で導入された非互換のためその直前の 12.4.7 に固定する(ImportStateHistory /
  # WidgetLayer / LayerInteraction / TuneAdjustmentMatrix / ColorFilterAddons 等、
  # editor featureが依存する公開APIは12.4.7時点でも同一シグネチャで存在することを
  # pub-cache内の実ソースで確認済み)。Flutter SDKが3.44以降へ更新された場合は
  # 13.0.0への引き上げを再検討する。
  pro_image_editor: 12.4.7
  cached_network_image: ^3.4.1 # フレーム/スタンプのサムネイル表示
  path_provider: ^2.1.6 # 撮影・加工画像の一時ファイル置き場
  image_picker: ^1.2.3 # フォトライブラリからの写真・動画取り込み(S-04)
  video_player: ^2.11.1 # S-05v 動画プレビュー画面の再生確認
  # OAuth(認可コード取得まで。トークン交換は Cloud Functions)
  flutter_appauth: ^12.0.2
  # 課金(IAP。RevenueCat)
  purchases_flutter: ^10.4.0
  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  cloud_functions: ^6.3.3
  firebase_messaging: ^16.4.1
  firebase_app_check: ^0.4.5
  # 端末識別(無料枠の乱用対策のデバイス単位管理用)。
  # Android: android_id(AndroidId.getId())。
  # iOS: device_info_plus(IosDeviceInfo.identifierForVendor)。
  # device_info_plus の AndroidDeviceInfo.id は Build.ID(OSビルドID)であり
  # 端末固有値ではないため、Android側の識別子取得には使用しない
  # (core/device/device_id_service.dart のdocコメント参照)。
  android_id: ^0.5.2
  device_info_plus: ^13.2.0
  # ローカル永続化(オンボーディング完了フラグ)
  shared_preferences: ^2.5.5
  # OS設定画面への遷移(カメラ権限恒久拒否時の「設定を開く」導線)
  app_settings: ^7.0.0
  # 外部ブラウザ起動(SNS連携ヘルプ・法定表記リンク)
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # コード生成
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  # NOTE: 上記 riverpod_annotation ^4.0.2 とのバージョン解決制約により riverpod 3.2.1 系列に
  # 固定される。riverpod 3.2.1 には `AsyncValue.valueOrNull`(nullableゲッター)が存在せず、
  # 代わりに `AsyncValue.value` 自体がnullableである(パッケージソースで確認済み)。
  # 全feature共通で `.value` に統一する(統合フェーズで `.valueOrNull` 使用箇所を置換済み)。
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  # Lint
  # NOTE: design.md は analyzer.plugins:[custom_lint] 経由の riverpod_lint 有効化を指定するが、
  # custom_lint ^0.8.1(pub.dev最新)は analyzer を ^8.0.0 に固定しており、riverpod_generator
  # (analyzer ^12.0.0 要求)・freezed 3.2.5・json_serializable 6.13台と同時解決できない
  # (flutter pub get で確認済み)。両立不可のため custom_lint/riverpod_lint は追加せず、
  # flutter_lints のみで運用する。custom_lint 側の対応バージョン公開後に再検討が必要。
  flutter_lints: ^6.0.0
  # テスト
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
